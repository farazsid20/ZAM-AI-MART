<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZAM AI MART - Discover the Best AI Tools in One Place. Browse 200+ AI tools with prices in Indian Rupees." />
    <meta name="keywords" content="AI tools, artificial intelligence, ChatGPT, Midjourney, AI directory, India" />
    <meta name="author" content="Ahmad Faraz Siddiqui" />
    <title>ZAM AI MART</title>
    <base href="/" />

    <!-- GitHub Pages SPA routing: restore path from 404.html redirect -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <!-- Tailwind CSS CDN (Play CDN for development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        violet: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#2e1065',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link href="css/app.css" rel="stylesheet" />
    <link href="ZamAiMart.Client.styles.css" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c3aed'/><text y='.9em' font-size='70' x='50%' text-anchor='middle'>Z</text></svg>" />
</head>

<body class="antialiased">
    <div id="app">
        <!-- Loading State -->
        <div id="loading-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#7c3aed,#4338ca);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:white;">
            <div style="width:60px;height:60px;background:rgba(255,255,255,0.1);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;margin-bottom:16px;border:2px solid rgba(255,255,255,0.2)">Z</div>
            <div style="font-size:22px;font-weight:900;letter-spacing:1px;margin-bottom:8px">ZAM AI MART</div>
            <div style="font-size:14px;opacity:0.7;margin-bottom:24px">Loading...</div>
            <div style="width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,0.2);border-top-color:white;animation:spin 0.8s linear infinite"></div>
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script>
        // Dark Mode Management
        window.darkMode = {
            get: function () {
                const saved = localStorage.getItem('darkMode');
                if (saved !== null) return saved === 'true';
                return window.matchMedia('(prefers-color-scheme: dark)').matches;
            },
            toggle: function (isDark) {
                localStorage.setItem('darkMode', isDark.toString());
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
        };

        // Apply saved dark mode on load
        if (window.darkMode.get()) {
            document.documentElement.classList.add('dark');
        }

        // Remove loading screen once Blazor is ready
        document.addEventListener('DOMContentLoaded', function () {
            const observer = new MutationObserver(function () {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen && document.getElementById('app').childElementCount > 1) {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.transition = 'opacity 0.3s';
                    setTimeout(() => loadingScreen.remove(), 300);
                    observer.disconnect();
                }
            });
            observer.observe(document.getElementById('app'), { childList: true });
        });
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
