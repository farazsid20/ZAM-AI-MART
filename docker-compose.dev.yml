version: '3.9'

# Development override - only starts PostgreSQL
# Run API and Client locally with dotnet run

services:
  postgres:
    image: postgres:16-alpine
    container_name: zamaimart-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ZamAiMart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zamaimart@2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

volumes:
  postgres_data_dev:
