name: Build & Push API Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'src/ZamAiMart.API/**'
      - 'src/ZamAiMart.Core/**'
      - 'src/ZamAiMart.Infrastructure/**'
  workflow_dispatch:

jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build Docker image (push if credentials available)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/ZamAiMart.API/Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/zam-ai-mart-api:latest
            ${{ env.DOCKERHUB_USERNAME }}/zam-ai-mart-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
